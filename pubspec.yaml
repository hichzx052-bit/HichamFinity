name: hicham_finity
description: "HichamFinity — أداة البث المباشر لتيك توك | TikTok LIVE Tools"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  # TTS
  flutter_tts: ^4.2.0
  # Video
  video_player: ^2.8.2
  file_picker: ^9.2.0
  # Network
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  dio: ^5.4.0
  # State
  provider: ^6.1.1
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  # Notifications
  flutter_local_notifications: ^19.0.0
  # Audio
  audioplayers: ^6.0.0
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
